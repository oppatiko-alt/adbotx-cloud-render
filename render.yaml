services:
  - type: web
    name: adbotx-backend
    runtime: python
    rootDir: adbot-x-fullstack/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_VOICE_ID_ALI
        sync: false
      - key: ELEVENLABS_VOICE_ID_TOPRAK
        sync: false
      - key: ELEVENLABS_VOICE_ID_MUSTAFA
        sync: false
      - key: ELEVENLABS_VOICE_ID_RASIT
        sync: false
      - key: ELEVENLABS_VOICE_ID_YASIN
        sync: false
      - key: SIMLI_API_KEY
        sync: false
      - key: SIMLI_FACE_ID
        sync: false
      - key: SIMLI_FACE_ID_ALI
        sync: false
      - key: SIMLI_FACE_ID_TOPRAK
        sync: false
      - key: SIMLI_FACE_ID_MUSTAFA
        sync: false
      - key: SIMLI_FACE_ID_RASIT
        sync: false
      - key: SIMLI_FACE_ID_YASIN
        sync: false
      - key: EDGE_TTS_VOICE
        value: "tr-TR-AhmetNeural"
      - key: EDGE_TTS_RATE
        value: "+0%"
